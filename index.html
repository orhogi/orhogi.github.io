<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>papa COTE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cyan: #00ffff;
    --magenta: #ff00ff;
    --dark: #080808;
    --card: rgba(12,12,12,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── CANVAS BACKGROUND ── */
  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── CARD ── */
  .card {
    position: relative;
    z-index: 10;
    width: min(480px, 92vw);
    padding: 48px 40px 40px;
    background: var(--card);
    border-radius: 24px;
    text-align: center;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0,255,255,0.1);
    animation: cardIn 1s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    transform: translateY(40px);
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── GLOW BORDER ── */
  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 25px;
    background: linear-gradient(120deg, var(--cyan), var(--magenta), var(--cyan));
    background-size: 200% 200%;
    animation: borderFlow 4s linear infinite;
    z-index: -1;
    opacity: 0.5;
    filter: blur(1px);
  }
  @keyframes borderFlow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── TITLE ── */
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.8em;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 36px;
    background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 0%; }
    100% { background-position: 200%; }
  }

  /* ── IMAGE RING ── */
  .ring-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 28px;
  }
  .ring-svg {
    position: absolute;
    inset: -14px;
    width: calc(100% + 28px);
    height: calc(100% + 28px);
    animation: rotateSVG 6s linear infinite;
    pointer-events: none;
  }
  @keyframes rotateSVG {
    to { transform: rotate(360deg); }
  }

  .img-frame {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 40px rgba(0,255,255,0.25),
      0 0 80px rgba(255,0,255,0.15);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s;
  }
  .img-frame:hover {
    transform: scale(1.06);
    box-shadow:
      0 0 60px rgba(0,255,255,0.45),
      0 0 100px rgba(255,0,255,0.3);
  }
  .img-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 18px;
    border-radius: 100px;
    border: 1px solid rgba(0,255,255,0.2);
    font-size: 0.78em;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    background: rgba(0,255,255,0.04);
    transition: all 0.3s;
  }
  .badge:hover {
    border-color: rgba(0,255,255,0.5);
    color: var(--cyan);
    background: rgba(0,255,255,0.08);
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── DIVIDER ── */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 24px auto;
    opacity: 0.4;
  }

  /* ── FOOTER TEXT ── */
  .foot {
    font-size: 0.75em;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ── FLOATING ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    filter: blur(80px);
    animation: orbFloat linear infinite;
  }
  .orb1 { width: 300px; height: 300px; background: rgba(0,255,255,0.06); top: -80px; left: -80px; animation-duration: 20s; }
  .orb2 { width: 250px; height: 250px; background: rgba(255,0,255,0.06); bottom: -60px; right: -60px; animation-duration: 25s; animation-direction: reverse; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(30px,-20px) scale(1.05); }
    66%      { transform: translate(-20px,30px) scale(0.95); }
  }
</style>
</head>

  <script>
    // ── Particle Canvas ──
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x  = Math.random() * W;
        this.y  = init ? Math.random() * H : H + 10;
        this.r  = Math.random() * 1.5 + 0.3;
        this.vy = -(Math.random() * 0.4 + 0.15);
        this.vx = (Math.random() - 0.5) * 0.3;
        this.alpha = Math.random() * 0.5 + 0.1;
        this.color = Math.random() > 0.5 ? '0,255,255' : '255,0,255';
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.y < -10) this.reset(false);
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
